services:
  # Database service using PostgreSQL 15
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ticketing_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web application service running Django
  web:
    build: .
    # Startup command to run migrations and seed the database
    command: >
      sh -c "python manage.py makemigrations tickets &&
             python manage.py migrate &&
             python manage.py seed_db &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=ticketing_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-123
    depends_on:
      db:
        condition: service_healthy

# Persistent volume for the database
volumes:
  postgres_data:

